<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympiad School — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#b91c1c;--red-dark:#991b1b;--red-light:#fef2f2;--red-border:#fecaca}
body{font-family:'Poppins',sans-serif;background:#f8faff;min-height:100vh;display:flex}

.sidebar{width:240px;background:var(--red);min-height:100vh;padding:0;display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s}
.sidebar-brand{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,0.12)}
.brand-icon{width:40px;height:40px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;margin-bottom:10px}
.brand-name{font-size:15px;font-weight:700;color:#fff}
.brand-sub{font-size:10px;color:rgba(255,255,255,0.5);margin-top:2px}
.nav-section{padding:16px 12px 0;flex:1}
.nav-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.4);padding:0 8px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;color:rgba(255,255,255,0.65);font-size:13px;cursor:pointer;transition:all .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;font-family:'Poppins',sans-serif}
.nav-item:hover{background:rgba(255,255,255,0.1);color:#fff}
.nav-item.active{background:rgba(255,255,255,0.18);color:#fff;font-weight:600}
.nav-icon{font-size:15px;width:20px;text-align:center}
.sidebar-footer{padding:14px;border-top:1px solid rgba(255,255,255,0.12)}
.admin-card{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,0.1);border-radius:10px}
.admin-avatar{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.admin-name{font-size:13px;font-weight:600;color:#fff}
.admin-role{font-size:10px;color:rgba(255,255,255,0.5)}

.main{flex:1;margin-left:240px;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e8edf5;padding:0 24px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:12px}
.menu-btn{display:none;width:36px;height:36px;border-radius:8px;background:#f8faff;border:1px solid #e8edf5;align-items:center;justify-content:center;cursor:pointer;font-size:18px}
.topbar-title h1{font-size:17px;font-weight:700;color:#1e293b}
.topbar-title p{font-size:11px;color:#94a3b8;margin-top:1px}
.date-chip{background:var(--red-light);border:1px solid var(--red-border);border-radius:8px;padding:5px 12px;font-size:12px;color:var(--red);font-weight:600;white-space:nowrap}
.content{padding:20px 24px;flex:1}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid #e8edf5;border-radius:14px;padding:16px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--red)}
.stat-icon{font-size:20px;margin-bottom:8px}
.stat-label{font-size:11px;color:#94a3b8;font-weight:500;margin-bottom:2px}
.stat-value{font-size:26px;font-weight:800;color:#1e293b}

.view-card{background:#fff;border:1px solid #e8edf5;border-radius:16px;overflow:hidden}
.view-head{padding:16px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.view-title{font-size:14px;font-weight:700;color:#1e293b}
.view-sub{font-size:11px;color:#94a3b8;margin-top:2px}

.mode-switch{display:flex;background:#f8faff;border:1px solid #e8edf5;border-radius:10px;padding:3px;gap:2px}
.mode-btn{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:#64748b;font-family:'Poppins',sans-serif;white-space:nowrap;transition:all .15s}
.mode-btn.active{background:var(--red);color:#fff}

.filter-row{display:flex;gap:8px;padding:12px 20px;border-bottom:1px solid #f1f5f9;overflow-x:auto;flex-wrap:nowrap}
.filter-chip{padding:6px 13px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #e8edf5;background:#f8faff;color:#64748b;white-space:nowrap;transition:all .15s;font-family:'Poppins',sans-serif;flex-shrink:0}
.filter-chip:hover{border-color:var(--red-border);color:var(--red)}
.filter-chip.active{background:var(--red);color:#fff;border-color:var(--red)}

.card-list{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.day-group-title{font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;padding:0 4px}
.lesson-card{background:#f8faff;border:1px solid #e8edf5;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;transition:border-color .15s}
.lesson-card:hover{border-color:var(--red-border);background:var(--red-light)}
.lc-time{font-size:12px;font-weight:700;color:var(--red);min-width:100px;flex-shrink:0}
.lc-body{flex:1;min-width:0}
.lc-teacher{font-size:13px;font-weight:600;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lc-subject{font-size:11px;color:#94a3b8;margin-top:1px}
.lc-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.lc-room{background:var(--red-light);color:var(--red);font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
.lc-group{font-size:10px;color:#94a3b8}

.empty-state{padding:40px;text-align:center;color:#94a3b8;font-size:13px}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:90}
.overlay.show{display:block}

@media(max-width:768px){
  .sidebar{transform:translateX(-240px)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .stats{grid-template-columns:repeat(2,1fr)}
  .content{padding:14px 12px}
  .topbar{padding:0 14px}
  .menu-btn{display:flex}
  .view-head{flex-direction:column;align-items:flex-start}
  .mode-switch{width:100%}
  .mode-btn{flex:1;text-align:center}
}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <img src="logo.png" style="width:80px;border-radius:8px">
    <div class="brand-name">Olympiad School</div>
    <div class="brand-sub">İdarəetmə Sistemi</div>
  </div>
  <div class="nav-section">
    <div class="nav-label">Əsas</div>
    <button class="nav-item active"><span class="nav-icon">🏠</span> Dashboard</button>
    <button class="nav-item"><span class="nav-icon">📅</span> Həftəlik Cədvəl</button>
    <button class="nav-item"><span class="nav-icon">👨‍🏫</span> Müəllimlər</button>
    <button class="nav-item"><span class="nav-icon">👥</span> Qruplar</button>
    <button class="nav-item"><span class="nav-icon">🎓</span> Şagirdlər</button>
    <div class="nav-label" style="margin-top:14px">Digər</div>
    <button class="nav-item"><span class="nav-icon">🚪</span> Otaqlar</button>
    <button class="nav-item"><span class="nav-icon">🔔</span> Bildirişlər</button>
    <button class="nav-item"><span class="nav-icon">⚙️</span> Tənzimləmələr</button>
  </div>
  <div class="sidebar-footer">
    <div class="admin-card">
      <div class="admin-avatar">A</div>
      <div>
        <div class="admin-name">İlqar Aslanlı</div>
        <div class="admin-role">Direktor</div>
      </div>
    </div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="menu-btn" onclick="toggleSidebar()">☰</div>
      <div class="topbar-title">
        <h1>Admin Dashboard</h1>
        <p>Olympiad School — idarəetmə paneli</p>
      </div>
    </div>
    <div class="date-chip" id="todayDate"></div>
  </div>

  <div class="content">
    <div class="stats">
      <div class="stat-card"><div class="stat-icon">🎓</div><div class="stat-label">Aktiv Şagirdlər</div><div class="stat-value">428</div></div>
      <div class="stat-card"><div class="stat-icon">👨‍🏫</div><div class="stat-label">Müəllimlər</div><div class="stat-value" id="statTeachers">0</div></div>
      <div class="stat-card"><div class="stat-icon">🚪</div><div class="stat-label">Otaqlar</div><div class="stat-value" id="statRooms">0</div></div>
      <div class="stat-card"><div class="stat-icon">📚</div><div class="stat-label">Bu həftə dərslər</div><div class="stat-value" id="statLessons">0</div></div>
    </div>

    <div class="view-card">
      <div class="view-head">
        <div>
          <div class="view-title">Həftəlik Dərs Cədvəli</div>
          <div class="view-sub">Gün, otaq və ya müəllimə görə bax</div>
        </div>
        <div class="mode-switch">
          <button class="mode-btn active" onclick="setMode('day',this)">📅 Günlük</button>
          <button class="mode-btn" onclick="setMode('room',this)">🚪 Otaq</button>
          <button class="mode-btn" onclick="setMode('teacher',this)">👨‍🏫 Müəllim</button>
        </div>
      </div>
      <div class="filter-row" id="filterRow"></div>
      <div id="scheduleContent"></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// REAL SCHEDULE DATA
// Hər dərs bir obyektdir:
// {
//   day:     'Bazar ertəsi',        // gün adı
//   time:    '09:00–10:30',         // saat aralığı
//   teacher: 'Nərmin müəllimə',     // müəllim adı
//   subject: 'Riyaziyyat',          // fənn
//   room:    'Otaq 1',              // otaq
//   group:   '5A',                  // qrup (istəyə görə)
// }
// ============================================================

const LESSONS = [
  // ── TURAL SÜLEYMANOV (Riyaziyyat və Məntiq) ──
  
  { day:'Bazar ertəsi',       time:'09:00–10:30', teacher:'Tural Süleymanov', subject:'Riyaziyyat və Məntiq', room:'3', group:'Ibtidai' },
  { day:'Bazar ertəsi',       time:'10:30–12:00', teacher:'Tural Süleymanov', subject:'Riyaziyyat və Məntiq', room:'3', group:'5-7-ci siniflər' },
  
  { day:'Çərşənbə axşamı',    time:'09:00–10:30', teacher:'Tural Süleymanov', subject:'Riyaziyyat və Məntiq', room:'3', group:'5-7-ci siniflər' },
  { day:'Çərşənbə axşamı',    time:'10:30–12:00', teacher:'Tural Süleymanov', subject:'Riyaziyyat və Məntiq', room:'3', group:'Ibtidai' },
 
  { day:'Cümə axşamı',        time:'09:00–10:30', teacher:'Tural Süleymanov', subject:'Riyaziyyat və Məntiq', room:'3', group:'Ibtidai' },
  { day:'Cümə axşamı',        time:'10:30–12:00', teacher:'Tural Süleymanov', subject:'Riyaziyyat və Məntiq', room:'3', group:'5-7-ci siniflər' },

  { day:'Çərşənbə axşamı',    time:'10:30–12:00', teacher:'Tural Süleymanov', subject:'Riyaziyyat və Məntiq', room:'3', group:'Ibtidai' },
  
  // ── TURAL ƏLİZADƏ ( Məntiq) ──

  { day:'Bazar ertəsi',      time:'09:30–11:00', teacher:'Tural Əlizadə', subject:'Məntiq', room:'4', group:'Ibtidai' },
  
  { day:'Çərşənbə axşamı',   time:'09:30–11:00', teacher:'Tural Əlizadə', subject:'Məntiq', room:'2', group:'Ibtidai' },
  
  { day:'Çərşənbə',          time:'15:30–16:30', teacher:'Tural Əlizadə', subject:'Məntiq', room:'3', group:'Ibtidai' },
  { day:'Çərşənbə',          time:'09:00–10:30', teacher:'Tural Əlizadə', subject:'Məntiq', room:'3', group:'Ibtidai' },
  
  { day:'Cümə axşamı',       time:'09:30–11:00', teacher:'Tural Əlizadə', subject:'Məntiq', room:'2', group:'Ibtidai' },
  
  { day:'Cümə',              time:'09:30–11:00', teacher:'Tural Əlizadə', subject:'Məntiq', room:'3', group:'Ibtidai' },
  { day:'Cümə',              time:'15:30–16:30', teacher:'Tural Əlizadə', subject:'Məntiq', room:'3', group:'Ibtidai' },
  
  { day:'Şənbə',             time:'09:00–10:30', teacher:'Tural Əlizadə', subject:'Məntiq', room:'3', group:'Ibtidai' },
  
  // ── AYTAC MÜƏLLİMƏ (İngilis dili) ──
 
  { day:'Çərşənbə',           time:'09:30-11:00', teacher:'Aytac müəllimə',   subject:'İngilis dili',        room:'4', group:'Məktəblilər' },
  { day:'Çərşənbə',           time:'11:00-12:30', teacher:'Aytac müəllimə',   subject:'İngilis dili',        room:'4', group:'İbtidai' },
  { day:'Çərşənbə',           time:'13:30-15:00', teacher:'Aytac müəllimə',   subject:'İngilis dili',        room:'4', group:'Böyüklər' },
 
  { day:'Cümə',               time:'09:30-11:00', teacher:'Aytac müəllimə',   subject:'İngilis dili',        room:'4', group:'Məktəblilər' },
  { day:'Cümə',               time:'11:00-12:30', teacher:'Aytac müəllimə',   subject:'İngilis dili',        room:'4', group:'İbtidai' },
  { day:'Cümə',               time:'13:30-15:00', teacher:'Aytac müəllimə',   subject:'İngilis dili',        room:'4', group:'Böyüklər' },
 
  // ── ELZA MÜƏLLİMƏ (Rus dili) ──
 
  { day:'Şənbə',              time:'15:00–16:30', teacher:'Elza müəllimə',    subject:'Rus dili',            room:'2', group:'Əli, Həsən' },
  { day:'Şənbə',              time:'16:30–18:00', teacher:'Elza müəllimə',    subject:'Rus dili',            room:'2', group:'İlkin' },

  // ── NƏRMİN MÜƏLLİMƏ (Riyaziyyat) ──
 
  { day:'Bazar ertəsi',       time:'09:00–10:30', teacher:'Nərmin müəllimə',  subject:'Riyaziyyat',          room:'6', group:'fərdi' },
  { day:'Bazar ertəsi',       time:'10:30–12:00', teacher:'Nərmin müəllimə',  subject:'Riyaziyyat',          room:'6', group:'məktəbli 1' },
  { day:'Bazar ertəsi',       time:'15:30–17:00', teacher:'Nərmin müəllimə',  subject:'Riyaziyyat',          room:'6', group:'məktəbli 2' },
  
  { day:'Çərşənbə',           time:'09:00–10:30', teacher:'Nərmin müəllimə',  subject:'Riyaziyyat',          room:'6', group:'fərdi' },
 
  { day:'Cümə axşamı',        time:'09:30–11:00', teacher:'Nərmin müəllimə',  subject:'Riyaziyyat',          room:'6', group:'məktəbli 1' },
  { day:'Cümə axşamı',        time:'14:00–15:30', teacher:'Nərmin müəllimə',  subject:'Riyaziyyat',          room:'6', group:'məktəbli 2' },
  
  // ── GÜLŞƏN MÜƏLLİMƏ (Azərbaycan dili) ──
 
  { day:'Bazar ertəsi',       time:'09:30–11:00', teacher:'Gülşən müəllimə',  subject:'Azərbaycan dili',     room:'2', group:'abituriyent' },
  { day:'Bazar ertəsi',       time:'11:00–12:30', teacher:'Gülşən müəllimə',  subject:'Azərbaycan dili',     room:'2', group:'lisey / gimnaziya' },

  { day:'Çərşənbə',           time:'09:30–11:00', teacher:'Gülşən müəllimə',  subject:'Azərbaycan dili',     room:'2', group:'abituriyent' },
  { day:'Çərşənbə',           time:'11:00–12:30', teacher:'Gülşən müəllimə',  subject:'Azərbaycan dili',     room:'2', group:'lisey / gimnaziya' },

  { day:'Bazar ertəsi',       time:'14:00–15:30', teacher:'Aytac müəllimə (İbtidai)',  subject:'İbtidai',     room:'2', group:'ibtidai' },
  { day:'Bazar ertəsi',       time:'09:00–10:15', teacher:'Aytac müəllimə (İbtidai)',  subject:'İbtidai',     room:'5', group:'yay məktəbi' },

  { day:'Çərşənbə',           time:'09:00–10:15', teacher:'Aytac müəllimə (İbtidai)',  subject:'İbtidai',     room:'5', group:'yay məktəbi' },
  { day:'Çərşənbə',           time:'14:00–15:30', teacher:'Aytac müəllimə (İbtidai)',  subject:'İbtidai',     room:'2', group:'ibtidai' },
 
  { day:'Cümə',               time:'14:00–15:30', teacher:'Aytac müəllimə (İbtidai)',  subject:'İbtidai',     room:'2', group:'ibtidai' },

  

   // ── ŞƏHANƏ MÜƏLLİMƏ ──

   { day:'Çərşənbə axşamı',    time:'16:00–18:00', teacher:'Şəhanə Müəllimə', subject:'Məktəbəqədər', room:'3', group:'məktəbəqədər' },
   
   { day:'Cümə axşamı',        time:'16:00–18:00', teacher:'Şəhanə Müəllimə', subject:'Məktəbəqədər', room:'3', group:'məktəbəqədər' },
   
 // ── MƏHƏMMƏD MÜƏLLİM ── 
  
  { day:'Bazar ertəsi',       time:'11:00–12:00', teacher:'Məhəmməd müəllim',  subject:'Şamat',     room:'5', group:'yay məktəbi' },
  
  { day:'Cümə',               time:'09:00–11:30', teacher:'Məhəmməd müəllim',  subject:'Şamat',     room:'5', group:'yay məktəbi' },
 
 
  // ── KÖNÜL MÜƏLLİMƏ (Azərbaycan dili) ──

  { day:'Çərşənbə',           time:'12:00–13:00', teacher:'Könül müəllimə',   subject:'Azərbaycan dili',     room:'3', group:'fərdi' },
 
  { day:'Şənbə',              time:'12:00–13:00', teacher:'Könül müəllimə',   subject:'Azərbaycan dili',     room:'3', group:'fərdi' },
];

// ============================================================
// Sabit siyahılar — LESSONS-dan avtomatik çıxarılır
// ============================================================
const DAYS    = ['Bazar ertəsi','Çərşənbə axşamı','Çərşənbə','Cümə axşamı','Cümə','Şənbə'];
const ROOMS   = [...new Set(LESSONS.map(l=>l.room))].sort();
const TEACHERS= [...new Set(LESSONS.map(l=>l.teacher))].sort();

// stat kartları yenilə
document.getElementById('statTeachers').textContent = TEACHERS.length || '—';
document.getElementById('statRooms').textContent    = ROOMS.length    || '—';
document.getElementById('statLessons').textContent  = LESSONS.length  || '—';

let currentMode  = 'day';
let currentFilter = 0;

function setMode(mode, btn){
  currentMode   = mode;
  currentFilter = 0;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderFilters();
  renderContent();
}

function renderFilters(){
  const row   = document.getElementById('filterRow');
  const items = currentMode==='day' ? DAYS : currentMode==='room' ? ROOMS : TEACHERS;
  row.innerHTML = items.map((item,i)=>
    `<button class="filter-chip ${i===currentFilter?'active':''}" onclick="selectFilter(${i},this)">${item}</button>`
  ).join('');
}

function selectFilter(idx, el){
  currentFilter = idx;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderContent();
}

function cardHTML(l){
  return `<div class="lesson-card">
    <div class="lc-time">${l.time}</div>
    <div class="lc-body">
      <div class="lc-teacher">${l.teacher}</div>
      <div class="lc-subject">${l.subject}</div>
    </div>
    <div class="lc-right">
      <div class="lc-room">${l.room}</div>
      ${l.group ? `<div class="lc-group">${l.group}</div>` : ''}
    </div>
  </div>`;
}

function renderContent(){
  const content = document.getElementById('scheduleContent');

  if(LESSONS.length===0){
    content.innerHTML='<div class="empty-state">📭 Cədvəl hələ daxil edilməyib</div>';
    return;
  }

  if(currentMode==='day'){
    const day = DAYS[currentFilter];
    const dayLessons = LESSONS.filter(l=>l.day===day)
      .sort((a,b)=>a.time.localeCompare(b.time));
    if(!dayLessons.length){ content.innerHTML='<div class="empty-state">Bu gün dərs yoxdur</div>'; return; }
    // saata görə qruplaşdır
    const byTime = {};
    dayLessons.forEach(l=>{ (byTime[l.time]=byTime[l.time]||[]).push(l); });
    let html='<div class="card-list">';
    Object.entries(byTime).forEach(([time,lessons])=>{
      html+=`<div class="day-group-title">${time}</div>`;
      lessons.forEach(l=>{ html+=cardHTML(l); });
    });
    html+='</div>';
    content.innerHTML=html;

  } else if(currentMode==='room'){
    const room = ROOMS[currentFilter];
    const roomLessons = LESSONS.filter(l=>l.room===room)
      .sort((a,b)=>DAYS.indexOf(a.day)-DAYS.indexOf(b.day)||a.time.localeCompare(b.time));
    if(!roomLessons.length){ content.innerHTML='<div class="empty-state">Bu otaqda dərs yoxdur</div>'; return; }
    const byDay = {};
    roomLessons.forEach(l=>{ (byDay[l.day]=byDay[l.day]||[]).push(l); });
    let html='<div class="card-list">';
    DAYS.forEach(day=>{ if(!byDay[day]) return; html+=`<div class="day-group-title">${day}</div>`; byDay[day].forEach(l=>{ html+=cardHTML(l); }); });
    html+='</div>';
    content.innerHTML=html;

  } else {
    const teacher = TEACHERS[currentFilter];
    const tLessons = LESSONS.filter(l=>l.teacher===teacher)
      .sort((a,b)=>DAYS.indexOf(a.day)-DAYS.indexOf(b.day)||a.time.localeCompare(b.time));
    if(!tLessons.length){ content.innerHTML='<div class="empty-state">Bu müəllimin dərsi yoxdur</div>'; return; }
    const byDay = {};
    tLessons.forEach(l=>{ (byDay[l.day]=byDay[l.day]||[]).push(l); });
    let html='<div class="card-list">';
    DAYS.forEach(day=>{ if(!byDay[day]) return; html+=`<div class="day-group-title">${day}</div>`; byDay[day].forEach(l=>{ html+=cardHTML(l); }); });
    html+='</div>';
    content.innerHTML=html;
  }
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
document.querySelectorAll('.nav-item').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    closeSidebar();
  });
});

const d=new Date();
const months=['Yanvar','Fevral','Mart','Aprel','May','İyun','İyul','Avqust','Sentyabr','Oktyabr','Noyabr','Dekabr'];
document.getElementById('todayDate').textContent=d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear();

renderFilters();
renderContent();
</script>
